DATA:
  dataset: OCID-VLG
  # `datasets` is a repository symlink to ../data on Linux servers.
  root_path: ./datasets/OCID-VLG
  version: multiple
  with_depth: false
  train_split: train
  val_split: val
MODEL:
  architecture: etrg
TRAIN:
  # RGB-only ETRG R50 profile. The auxiliary encoder consumes RGB.
  etrg_input_mode: rgb
  clip_pretrain: pretrain/RN50.pt
  depth_pretrain:
  depth_backbone_pretrained: true
  depth_normalization: inverse_max
  input_size: 416
  word_len: 20
  word_dim: 1024
  ladder_dim: 64
  nhead: 4
  multi_stage: 3
  vis_dim: 512
  fpn_in: [512, 1024, 1024]
  fpn_out: [256, 512, 1024]
  sync_bn: true
  num_layers: 3
  num_head: 8
  dim_ffn: 512
  dropout: 0.1
  intermediate: false
  workers: 8
  workers_val: 4
  epochs: 40
  milestones: [35]
  start_epoch: 0
  # Per-GPU batch sizes; 8 x 2 GPUs gives global batch 16 on two RTX 3090s.
  batch_size: 8
  batch_size_val: 8
  base_lr: 0.0001
  lr_decay: 0.1
  lr_multi: 1.0
  weight_decay: 0.01
  max_norm: 0.0
  manual_seed: 0
  print_freq: 50
  exp_name: etrg_r50_ocid_vlg
  output_folder: exp/ocid_vlg
  save_freq: 1
  weight:
  resume:
  evaluate: true
Distributed:
  dist_url: env://
  dist_backend: nccl
  multiprocessing_distributed: true
  world_size: 1
  rank: 0
TEST:
  test_split: test
  visualize: false
