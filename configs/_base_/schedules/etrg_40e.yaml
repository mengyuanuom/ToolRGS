TRAIN:
  workers: 8
  workers_val: 4
  epochs: 40
  start_epoch: 0
  batch_size: 8
  batch_size_val: 8
  base_lr: 0.0001
  lr_multi: 1.0
  weight_decay: 0.01
  max_norm: 0.0
  weight:
  resume:
  evaluate: true
RUNTIME:
  optim_wrapper:
    type: cuda_amp
  param_scheduler:
    type: multi_step
    milestones: [35]
    gamma: 0.1
